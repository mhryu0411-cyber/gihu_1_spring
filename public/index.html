<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 벚꽃 개화 제보 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Pretendard','Apple SD Gothic Neo',sans-serif; }
#map { width:100%; height:100vh; }

/* 사이드 패널 */
#panel {
  position:absolute; top:0; right:0; width:380px; height:100vh;
  background:rgba(255,255,255,.97); z-index:1000;
  box-shadow:-4px 0 24px rgba(0,0,0,.12);
  display:flex; flex-direction:column;
  transition:transform .3s;
}
#panel.hidden { transform:translateX(100%); }
#panel header {
  padding:24px 20px 16px;
  background:linear-gradient(135deg,#FFB7C5,#FF69B4);
  color:#fff;
}
#panel header h1 { font-size:20px; margin-bottom:4px; }
#panel header p { font-size:13px; opacity:.9; }
.tab-bar { display:flex; border-bottom:2px solid #f0f0f0; }
.tab-bar button {
  flex:1; padding:12px; border:none; background:none;
  font-size:14px; cursor:pointer; font-weight:600; color:#999;
}
.tab-bar button.active { color:#FF69B4; border-bottom:2px solid #FF69B4; margin-bottom:-2px; }

/* 제보 폼 */
#form-tab, #list-tab { padding:20px; overflow-y:auto; flex:1; }
#form-tab label { display:block; font-size:13px; font-weight:600; color:#555; margin:12px 0 4px; }
#form-tab input, #form-tab textarea {
  width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px;
  font-size:14px; outline:none;
}
#form-tab input:focus, #form-tab textarea:focus { border-color:#FF69B4; }
#form-tab textarea { resize:vertical; height:60px; }
#coord-display { font-size:12px; color:#999; margin-top:4px; }
#submit-btn {
  margin-top:20px; width:100%; padding:14px; border:none; border-radius:10px;
  background:linear-gradient(135deg,#FFB7C5,#FF69B4);
  color:#fff; font-size:16px; font-weight:700; cursor:pointer;
}
#submit-btn:hover { filter:brightness(1.05); }

/* 제보 목록 */
.report-card {
  padding:14px; margin-bottom:10px; border-radius:10px;
  background:#FFF5F7; border-left:4px solid #FF69B4;
}
.report-card h4 { font-size:14px; color:#333; }
.report-card p { font-size:12px; color:#777; margin-top:4px; }

/* 토글 버튼 */
#toggle-btn {
  position:absolute; top:50%; right:380px; z-index:1001;
  transform:translateY(-50%); width:28px; height:60px;
  background:#FF69B4; color:#fff; border:none; border-radius:8px 0 0 8px;
  cursor:pointer; font-size:16px; transition:right .3s;
}
#toggle-btn.shifted { right:0; }

/* 안내 배너 */
#guide {
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  z-index:900; background:rgba(255,255,255,.92); padding:10px 24px;
  border-radius:30px; font-size:14px; color:#555;
  box-shadow:0 2px 12px rgba(0,0,0,.1); pointer-events:none;
}
</style>
</head>
<body>

<div id="map"></div>
<div id="guide">🌸 지도를 클릭하여 벚꽃 개화 위치를 제보하세요</div>

<button id="toggle-btn" onclick="togglePanel()">◀</button>

<div id="panel">
  <header>
    <h1>🌸 벚꽃 개화 제보</h1>
    <p>시민 참여형 개화 현황 지도</p>
  </header>
  <div class="tab-bar">
    <button class="active" onclick="showTab('form')">제보하기</button>
    <button onclick="showTab('list')">제보 목록</button>
  </div>
  <div id="form-tab">
    <label>📍 위치 (지도를 클릭하세요)</label>
    <input id="loc-name" placeholder="장소명 (예: 여의도 윤중로)">
    <div id="coord-display">좌표: 지도를 클릭해주세요</div>

    <label>📅 개화 확인 날짜</label>
    <input type="date" id="bloom-date">

    <label>📝 메모 (선택)</label>
    <textarea id="note" placeholder="개화 정도, 날씨 등 자유롭게"></textarea>

    <button id="submit-btn" onclick="submitReport()">제보 등록</button>
  </div>
  <div id="list-tab" style="display:none"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API = location.origin;
const map = L.map("map",{zoomControl:false}).setView([36.5,127.8],7);
L.control.zoom({position:"bottomleft"}).addTo(map);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",{
  maxZoom:19, attribution:'&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

// 대한민국 범위 제한
map.setMaxBounds([[33,124],[39,132]]);
map.options.minZoom=6;

const blossomIcon = L.divIcon({
  html:'<div style="font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))">🌸</div>',
  iconSize:[28,28], iconAnchor:[14,14], className:''
});

let markers = L.layerGroup().addTo(map);
let clickMarker = null;
let selectedLat = null, selectedLng = null;

// 지도 클릭 → 위치 선택
map.on("click", e => {
  if(e.latlng.lat<33||e.latlng.lat>39||e.latlng.lng<124||e.latlng.lng>132) return;
  selectedLat = e.latlng.lat;
  selectedLng = e.latlng.lng;
  document.getElementById("coord-display").textContent =
    `좌표: ${selectedLat.toFixed(5)}, ${selectedLng.toFixed(5)}`;
  if(clickMarker) map.removeLayer(clickMarker);
  clickMarker = L.marker([selectedLat,selectedLng],{
    icon: L.divIcon({html:'<div style="font-size:32px">📌</div>',iconSize:[32,32],iconAnchor:[16,16],className:''})
  }).addTo(map);
});

// 제보 등록
async function submitReport(){
  const bloom_date = document.getElementById("bloom-date").value;
  if(!selectedLat||!bloom_date){ alert("위치와 날짜를 입력해주세요"); return; }
  await fetch(API+"/api/reports",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      lat:selectedLat, lng:selectedLng,
      location_name:document.getElementById("loc-name").value,
      bloom_date, note:document.getElementById("note").value
    })
  });
  alert("🌸 제보가 등록되었습니다!");
  document.getElementById("loc-name").value="";
  document.getElementById("bloom-date").value="";
  document.getElementById("note").value="";
  document.getElementById("coord-display").textContent="좌표: 지도를 클릭해주세요";
  if(clickMarker){map.removeLayer(clickMarker);clickMarker=null;}
  selectedLat=selectedLng=null;
  loadReports();
}

// 제보 목록 로드
async function loadReports(){
  const res = await fetch(API+"/api/reports");
  const data = await res.json();
  markers.clearLayers();
  const listEl = document.getElementById("list-tab");
  listEl.innerHTML = data.length? "" : "<p style='color:#999;text-align:center;margin-top:40px'>아직 제보가 없습니다</p>";
  data.forEach(r=>{
    const m = L.marker([r.lat,r.lng],{icon:blossomIcon}).addTo(markers);
    m.bindPopup(`<b>${r.location_name||'제보 위치'}</b><br>📅 ${r.bloom_date}<br>${r.note||''}`);
    listEl.innerHTML += `<div class="report-card">
      <h4>🌸 ${r.location_name||'제보 위치'}</h4>
      <p>📅 개화일: ${r.bloom_date}</p>
      ${r.note?'<p>📝 '+r.note+'</p>':''}
      <p style="font-size:11px;color:#aaa">${r.created_at||''}</p>
    </div>`;
  });
}

function showTab(t){
  document.getElementById("form-tab").style.display=t==="form"?"block":"none";
  document.getElementById("list-tab").style.display=t==="list"?"block":"none";
  document.querySelectorAll(".tab-bar button").forEach((b,i)=>b.classList.toggle("active",(t==="form"?i===0:i===1)));
  if(t==="list") loadReports();
}

function togglePanel(){
  document.getElementById("panel").classList.toggle("hidden");
  document.getElementById("toggle-btn").classList.toggle("shifted");
}

// 초기화: 오늘 날짜 기본값 & 데이터 로드
document.getElementById("bloom-date").valueAsDate=new Date();
loadReports();
</script>
</body>
</html>
